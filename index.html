<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업기록 자동완성</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f2;color:#1a1916;padding:16px;max-width:720px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:12px;color:#8a8880;margin-bottom:16px}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.section-title{font-size:15px;font-weight:500;margin-bottom:12px}
.time-row{display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.time-row label{font-size:13px;color:#5f5e5a;min-width:44px}
input[type=text],input[type=time],input[type=date],select{font-size:13px;padding:6px 8px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1916;outline:none}
input[type=text]:disabled{opacity:.3;background:#f5f5f0}
.grade-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.grade-tab{font-size:13px;padding:6px 14px;border:0.5px solid #d3d1c7;border-radius:99px;background:#fff;color:#5f5e5a;cursor:pointer;transition:all .15s}
.grade-tab.active{background:#1a1916;color:#f7f6f2;border-color:#1a1916}
.student-chips{display:flex;gap:6px;flex-wrap:wrap;min-height:36px}
.chip{font-size:13px;padding:6px 14px;border:0.5px solid #d3d1c7;border-radius:99px;background:#fff;color:#1a1916;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:#888780}
.chip.selected{background:#1a1916;color:#f7f6f2;border-color:#1a1916}
.no-student{font-size:13px;color:#8a8880;padding:8px 0}
.grade-label{font-size:13px;font-weight:500;color:#5f5e5a;margin:12px 0 6px;padding-top:12px;border-top:0.5px solid #e0deda}
.grade-label:first-child{border-top:none;padding-top:0;margin-top:0}
.student-block{border:0.5px solid #d3d1c7;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.student-top{display:grid;grid-template-columns:90px 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px}
.student-name{font-size:14px;font-weight:500}
.student-bottom{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.check-label{display:flex;align-items:center;gap:4px;font-size:12px;color:#5f5e5a;cursor:pointer;white-space:nowrap}
.hw-done{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;white-space:nowrap}
.hw-done input:checked+span{color:#0F6E56;font-weight:500}
.hw-done span{color:#5f5e5a;transition:color .15s}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;margin-left:4px}
.badge.absent{background:#fcebeb;color:#791F1F}
.badge.sick{background:#faeeda;color:#633806}
.badge.hw{background:#E1F5EE;color:#085041}
.result-box{background:#f5f5f0;border:0.5px solid #d3d1c7;border-radius:8px;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:#1a1916;min-height:80px}
.btn{background:#fff;border:0.5px solid #b4b2a9;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#1a1916}
.btn:hover{background:#f5f5f0}
.btn:active{transform:scale(.98)}
.btn-dark{background:#1a1916;color:#f7f6f2;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-dark:hover{opacity:.85}
.toast{display:none;text-align:center;font-size:13px;color:#3B6D11;margin-top:8px}
.add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.divider{border:none;border-top:0.5px solid #e0deda;margin:12px 0}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #e0deda;font-size:13px}
.history-item:last-child{border-bottom:none}
.history-date{font-weight:500}
.history-btns{display:flex;gap:6px}
.history-btn{font-size:12px;padding:4px 10px;border:0.5px solid #d3d1c7;border-radius:6px;background:#fff;cursor:pointer;color:#1a1916}
.history-btn:hover{background:#f5f5f0}
.history-btn.del{color:#a32d2d;border-color:#f09595}
.empty-history{font-size:13px;color:#8a8880;padding:8px 0}
.save-bar{display:flex;justify-content:flex-end;margin-bottom:8px}
</style>
</head>
<body>
<h1>수업기록 자동완성</h1>
<p class="subtitle">학생 목록과 기록이 자동으로 저장됩니다.</p>

<div class="card">
  <p class="section-title">기본 정보</p>
  <div class="time-row">
    <label>날짜</label>
    <input type="date" id="date-input" oninput="updateResult()" style="width:150px">
  </div>
  <div class="time-row">
    <label>출근</label>
    <input type="time" id="in-time" value="17:00" oninput="updateResult()" style="width:110px">
    <label>퇴근</label>
    <input type="time" id="out-time" value="22:00" oninput="updateResult()" style="width:110px">
  </div>
</div>

<div class="card">
  <p class="section-title">학생 선택</p>
  <div class="grade-tabs" id="grade-tabs"></div>
  <div class="student-chips" id="student-chips"></div>
  <hr class="divider">
  <p style="font-size:12px;color:#5f5e5a;margin-bottom:8px">학생 추가</p>
  <div class="add-row">
    <select id="add-school" onchange="updateGradeOptions()" style="width:80px">
      <option>초등</option><option>중</option><option selected>고</option>
    </select>
    <select id="add-grade" style="width:70px"></select>
    <input type="text" id="add-name" placeholder="이름" style="flex:1;min-width:80px">
    <button class="btn-dark" onclick="addStudent()">추가</button>
  </div>
</div>

<div class="card" id="record-card" style="display:none">
  <p class="section-title">수업 내용 입력</p>
  <div id="record-list"></div>
  <hr class="divider">
  <div class="save-bar">
    <button class="btn-dark" onclick="saveRecord()">기록 저장</button>
  </div>
  <div class="toast" id="save-toast">저장됐어요!</div>
</div>

<div class="card" id="result-card" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <p class="section-title" style="margin:0">카톡 전송용 결과</p>
    <button class="btn" onclick="copyText()">복사 ↗</button>
  </div>
  <div class="result-box" id="result"></div>
  <div class="toast" id="copy-toast">복사됐어요!</div>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <p class="section-title" style="margin:0">저장된 기록</p>
    <button class="btn" onclick="clearAllHistory()" style="font-size:12px;color:#a32d2d;border-color:#f09595">전체 삭제</button>
  </div>
  <div id="history-list"></div>
</div>

<script>
const STUDENTS_KEY='classRecord_students';
const HISTORY_KEY='classRecord_history';

let allStudents=JSON.parse(localStorage.getItem(STUDENTS_KEY)||'null')||[
  {school:'고',grade:'1',name:'고예성'},{school:'고',grade:'1',name:'전영주'},
  {school:'고',grade:'1',name:'신하영'},{school:'고',grade:'1',name:'김민완'},
  {school:'고',grade:'2',name:'임선민'},{school:'고',grade:'2',name:'김가은'},
  {school:'고',grade:'2',name:'정다은'},{school:'고',grade:'3',name:'이다온'},
  {school:'고',grade:'3',name:'이지후'},{school:'고',grade:'3',name:'윤연아'}
];
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
let selectedSchool='고';
let records=[];

const schoolGrades={초등:['1','2','3','4','5','6'],중:['1','2','3'],고:['1','2','3']};

function saveStudents(){ localStorage.setItem(STUDENTS_KEY,JSON.stringify(allStudents)); }
function saveHistory(){ localStorage.setItem(HISTORY_KEY,JSON.stringify(history)); }

function updateGradeOptions(){
  const school=document.getElementById('add-school').value;
  const sel=document.getElementById('add-grade');
  sel.innerHTML=schoolGrades[school].map(g=>`<option>${g}</option>`).join('');
}

function gradeKey(s){return s.school+'_'+s.grade;}
function gradeLabelFull(s){return `${s.school}${s.school==='초등'?s.grade+'학년 수학':s.grade+' 수학'}`;}

function renderGradeTabs(){
  const schools=[...new Set(allStudents.map(s=>s.school))];
  if(!schools.includes(selectedSchool)) selectedSchool=schools[0]||'고';
  document.getElementById('grade-tabs').innerHTML=schools.map(sc=>
    `<button class="grade-tab${sc===selectedSchool?' active':''}" onclick="selectSchool('${sc}')">${sc}</button>`
  ).join('');
}

function selectSchool(sc){selectedSchool=sc;renderGradeTabs();renderChips();}

function renderChips(){
  const filtered=allStudents.filter(s=>s.school===selectedSchool);
  const chips=document.getElementById('student-chips');
  if(!filtered.length){chips.innerHTML=`<span class="no-student">등록된 학생이 없어요</span>`;return;}
  const grades=[...new Set(filtered.map(s=>s.grade))].sort();
  chips.innerHTML=grades.map(g=>{
    const label=`<div style="width:100%;font-size:11px;color:#8a8880;margin-top:4px">${selectedSchool}${selectedSchool==='초등'?g+'학년':g}</div>`;
    const cs=filtered.filter(s=>s.grade===g).map(s=>{
      const idx=allStudents.indexOf(s);
      const sel=records.some(r=>r._idx===idx);
      return `<span class="chip${sel?' selected':''}" onclick="toggleStudent(${idx})">${s.name}</span>`;
    }).join('');
    return label+cs;
  }).join('');
}

function toggleStudent(idx){
  const s=allStudents[idx];
  const ri=records.findIndex(r=>r._idx===idx);
  if(ri>=0){records.splice(ri,1);}
  else{
    records.push({_idx:idx,school:s.school,grade:s.grade,name:s.name,content:'',homework:'',hwDone:false,absent:false,sick:false,reason:''});
    records.sort((a,b)=>a.school!==b.school?a.school.localeCompare(b.school):a.grade.localeCompare(b.grade));
  }
  renderChips();renderRecordList();
  document.getElementById('record-card').style.display=records.length?'block':'none';
  document.getElementById('result-card').style.display=records.length?'block':'none';
  updateResult();
}

function renderRecordList(){
  const c=document.getElementById('record-list');c.innerHTML='';
  const groups=[...new Set(records.map(r=>gradeKey(r)))];
  groups.forEach(key=>{
    const gs=records.filter(r=>gradeKey(r)===key);
    const lbl=document.createElement('p');lbl.className='grade-label';lbl.textContent=gradeLabelFull(gs[0]);c.appendChild(lbl);
    gs.forEach(s=>{
      const idx=records.indexOf(s);
      const isAbsent=s.absent||s.sick;
      const badge=s.sick?`<span class="badge sick">병결</span>`:s.absent&&s.reason?`<span class="badge absent">${s.reason}</span>`:s.absent?`<span class="badge absent">결석</span>`:'';
      const hwBadge=s.hwDone&&!isAbsent?`<span class="badge hw">과제O</span>`:'';
      const b=document.createElement('div');b.className='student-block';
      b.innerHTML=`
        <div class="student-top">
          <span class="student-name">${s.name}${badge}${hwBadge}</span>
          <input type="text" placeholder="수업 내용" value="${s.content}" ${isAbsent?'disabled':''} oninput="records[${idx}].content=this.value;updateResult()">
          <input type="text" placeholder="과제" value="${s.homework}" oninput="records[${idx}].homework=this.value;updateResult()">
        </div>
        <div class="student-bottom">
          <label class="hw-done"><input type="checkbox" ${s.hwDone?'checked':''} ${isAbsent?'disabled':''} onchange="records[${idx}].hwDone=this.checked;renderRecordList();updateResult()"><span>과제 완료</span></label>
          <label class="check-label"><input type="checkbox" ${s.absent?'checked':''} onchange="records[${idx}].absent=this.checked;if(this.checked)records[${idx}].sick=false;renderRecordList();updateResult()"> 결석</label>
          <label class="check-label"><input type="checkbox" ${s.sick?'checked':''} onchange="records[${idx}].sick=this.checked;if(this.checked)records[${idx}].absent=false;renderRecordList();updateResult()"> 병결</label>
          ${s.absent?`<input type="text" placeholder="결석 사유" value="${s.reason}" style="font-size:12px;padding:4px 8px;width:160px" oninput="records[${idx}].reason=this.value;renderRecordList();updateResult()">`:'' }
        </div>`;
      c.appendChild(b);
    });
  });
}

function addStudent(){
  const school=document.getElementById('add-school').value;
  const grade=document.getElementById('add-grade').value;
  const name=document.getElementById('add-name').value.trim();
  if(!name)return;
  allStudents.push({school,grade,name});
  document.getElementById('add-name').value='';
  saveStudents();
  selectedSchool=school;
  renderGradeTabs();renderChips();
}

function saveRecord(){
  if(!records.length)return;
  const dateVal=document.getElementById('date-input').value;
  const key=dateVal||new Date().toISOString().slice(0,10);
  const txt=document.getElementById('result').textContent;
  const existing=history.findIndex(h=>h.date===key);
  if(existing>=0) history[existing]={date:key,text:txt};
  else history.unshift({date:key,text:txt});
  saveHistory();
  renderHistory();
  const t=document.getElementById('save-toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

function renderHistory(){
  const c=document.getElementById('history-list');
  if(!history.length){c.innerHTML=`<p class="empty-history">아직 저장된 기록이 없어요</p>`;return;}
  c.innerHTML=history.map((h,i)=>`
    <div class="history-item">
      <span class="history-date">${h.date}</span>
      <div class="history-btns">
        <button class="history-btn" onclick="loadRecord(${i})">불러오기</button>
        <button class="history-btn del" onclick="deleteRecord(${i})">삭제</button>
      </div>
    </div>`).join('');
}

function loadRecord(i){
  const txt=history[i].text;
  document.getElementById('result').textContent=txt;
  document.getElementById('result-card').style.display='block';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth'});
}

function deleteRecord(i){
  history.splice(i,1);
  saveHistory();
  renderHistory();
}

function clearAllHistory(){
  if(!confirm('저장된 기록을 모두 삭제할까요?'))return;
  history=[];
  saveHistory();
  renderHistory();
}

function fmtTime(val){
  if(!val)return'';
  const [h,m]=val.split(':').map(Number);
  return `${h<12?'오전':'오후'} ${h%12||12}:${String(m).padStart(2,'0')}`;
}

function getDayStr(){
  const days=['일','월','화','수','목','금','토'];
  const val=document.getElementById('date-input').value;
  const d=val?new Date(val+'T00:00:00'):new Date();
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

function updateResult(){
  if(!records.length)return;
  const inT=fmtTime(document.getElementById('in-time').value);
  const outT=fmtTime(document.getElementById('out-time').value);
  let txt=`${getDayStr()} 일일수업기록 / 수학 / 이서빈 T\n\n*근무 현황\n- 출근 시간: ${inT}\n- 퇴근 시간: ${outT}\n\n*수업 특이사항\n`;
  const groups=[...new Set(records.map(r=>gradeKey(r)))];
  groups.forEach(key=>{
    const gs=records.filter(r=>gradeKey(r)===key);
    txt+=`\n- ${gradeLabelFull(gs[0])}\n`;
    gs.forEach(s=>{
      if(s.sick)txt+=`${s.name} / 병결\n과제 : ${s.homework||'-'}\n\n`;
      else if(s.absent)txt+=`${s.name} / 결석${s.reason?` (${s.reason})`:''}\n과제 : ${s.homework||'-'}\n\n`;
      else txt+=`${s.name} / ${s.content||'-'}\n과제 : ${s.hwDone?(s.homework||'-')+' ✓':(s.homework||'-')}\n\n`;
    });
  });
  document.getElementById('result').textContent=txt.trim();
}

function copyText(){
  navigator.clipboard.writeText(document.getElementById('result').textContent).then(()=>{
    const t=document.getElementById('copy-toast');
    t.style.display='block';
    setTimeout(()=>t.style.display='none',2000);
  });
}

function initDate(){
  const d=new Date();
  document.getElementById('date-input').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

updateGradeOptions();initDate();renderGradeTabs();renderChips();renderHistory();
</script>
</body>
</html>
